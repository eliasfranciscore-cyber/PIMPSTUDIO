<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/pimp-studio-mark.svg" />
    <link rel="apple-touch-icon" href="/assets/pimp-studio-logo.jpg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Tipografía gótica (blackletter) para el título del hero "BRUNETTI". -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet" />
    <!-- Preload del hero (elemento LCP de la landing) para acelerar el primer paint. -->
    <link rel="preload" as="image" href="/assets/bruno-hero.jpg" fetchpriority="high" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Brunetti" />
    <!-- Evita que iOS auto-detecte y estilice los teléfonos (caja negra en modo claro). -->
    <meta name="format-detection" content="telephone=no" />
    <title>Brunetti · Barbería Premium Maipú</title>
    <meta name="description" content="Barbería premium en Maipú, Santiago. Reserva tu cita online con Bruno Herrera. Brunetti — visagismo y estilo masculino de excelencia." />
    <link rel="canonical" href="https://brunetticutz.cl/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Brunetti" />
    <meta property="og:url" content="https://brunetticutz.cl/" />
    <meta property="og:title" content="Brunetti · Barbería Premium" />
    <meta property="og:description" content="Reserva tu cita en segundos. Visagismo, cortes y experiencia premium en Maipú, Santiago." />
    <!-- theme-color único y dinámico: lo sincroniza el JS con data-theme (NO con
         prefers-color-scheme), porque el tema real lo decide el toggle / la hora
         de Santiago. Así iOS no pinta las barras sup/inf con el color del tema
         contrario al que se ve en pantalla. -->
    <meta name="theme-color" content="#080807" />
    <script>
      // Tema inicial sin flash: respeta elección manual; si no, hora de Santiago (claro de día, oscuro de noche).
      (function () {
        try {
          var t;
          if (localStorage.getItem('ps_theme_manual') === '1') { t = localStorage.getItem('ps_theme') || 'dark'; }
          else {
            var h = parseInt(new Intl.DateTimeFormat('es-CL', { timeZone: 'America/Santiago', hour: 'numeric', hour12: false }).format(new Date()), 10) % 24;
            t = (h >= 7 && h < 19) ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', t);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', t === 'light' ? '#f6f5f3' : '#080807');
        } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
